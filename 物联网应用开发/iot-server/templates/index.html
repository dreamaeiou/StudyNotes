<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Physiological Monitoring System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
  h1 { text-align: center; margin-bottom: 18px; color: #38bdf8; font-size: 1.7rem; }
  .sub { text-align:center; color:#94a3b8; margin-bottom: 18px; }
  .toolbar, .grid, .chart-wrap, .ctrl, .log, .device-list { max-width: 1180px; margin-left: auto; margin-right: auto; }
  .toolbar { display:flex; gap:12px; align-items:center; flex-wrap: wrap; margin-bottom: 16px; background:#1e293b; border:1px solid #334155; border-radius: 12px; padding: 14px 16px; }
  select { background:#0b1220; color:#e2e8f0; border:1px solid #334155; border-radius:8px; padding:8px 10px; }
  .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:16px; margin-bottom:20px; }
  .card { background:#1e293b; border-radius:12px; padding:20px; border:1px solid #334155; }
  .card h3 { font-size:0.9rem; color:#94a3b8; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
  .value { font-size: 2.2rem; font-weight: 700; }
  .unit { font-size: 1rem; color: #64748b; margin-left: 4px; }
  .status { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; }
  .online { background:#22c55e; box-shadow:0 0 8px #22c55e; }
  .offline { background:#ef4444; }
  .chart-wrap, .ctrl, .log, .device-list { background:#1e293b; border:1px solid #334155; border-radius:12px; padding:20px; }
  .chart-wrap { margin-bottom:20px; }
  .ctrl { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:20px; }
  .device-list { margin-bottom:20px; }
  .device-items { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:12px; margin-top:12px; }
  .device-item { background:#0b1220; border:1px solid #334155; border-radius:10px; padding:12px; cursor:pointer; }
  .device-item.active { border-color:#0ea5e9; box-shadow:0 0 0 1px #0ea5e9 inset; }
  button { background:#0ea5e9; border:none; color:white; padding:10px 18px; border-radius:8px; cursor:pointer; font-size:0.95rem; }
  button:hover { background:#0284c7; }
  button.danger { background:#ef4444; }
  button.danger:hover { background:#dc2626; }
  .log { background:#0b1220; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:0.85rem; max-height:220px; overflow-y:auto; }
  .log div { margin-bottom:4px; color:#94a3b8; }
  .time { color:#64748b; margin-right:8px; }
</style>
</head>
<body>
<h1>Human Physiological Monitoring System</h1>
<div class="sub">CSV storage · Multi-device · Realtime updates · MQTT enabled</div>

<div class="toolbar">
  <label>Current device:</label>
  <select id="deviceSelect"></select>
  <button onclick="refreshAll()">Refresh</button>
  <span id="toolbarStatus" style="color:#94a3b8;"></span>
</div>

<div class="grid">
  <div class="card"><h3>Device Status</h3><div><span id="st-dot" class="status offline"></span><span id="st-text">offline</span></div></div>
  <div class="card"><h3>Heart Rate</h3><div><span id="heart_rate" class="value">--</span><span class="unit">bpm</span></div></div>
  <div class="card"><h3>SpO2</h3><div><span id="spo2" class="value">--</span><span class="unit">%</span></div></div>
  <div class="card"><h3>Body Temperature</h3><div><span id="body_temperature" class="value">--</span><span class="unit">°C</span></div></div>
  <div class="card"><h3>Last Update</h3><div id="last" style="font-size:1.05rem; margin-top:10px;">--</div></div>
</div>

<div class="device-list">
  <strong>Device Overview</strong>
  <div class="device-items" id="deviceItems"></div>
</div>

<div class="chart-wrap">
  <canvas id="chart" height="100"></canvas>
</div>

<div class="ctrl">
  <strong>Device Control:</strong>
  <button onclick="sendCmd('alarm', 1)">Alarm On</button>
  <button class="danger" onclick="sendCmd('alarm', 0)">Alarm Off</button>
  <button onclick="sendCmd('ping', 1)">Ping</button>
  <span id="cmd-res" style="margin-left:auto; color:#64748b;"></span>
</div>

<div class="log" id="log"></div>

<script>
const MAX_POINTS = 60;
let currentDeviceId = '';
let devicesCache = [];

const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      { label: 'Heart Rate (bpm)', data: [], borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.12)', tension: 0.3, fill: true, pointRadius: 2 },
      { label: 'SpO2 (%)', data: [], borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.12)', tension: 0.3, fill: true, pointRadius: 2 },
      { label: 'Body Temperature (°C)', data: [], borderColor: '#38bdf8', backgroundColor: 'rgba(56,189,248,0.12)', tension: 0.3, fill: true, pointRadius: 2 }
    ]
  },
  options: {
    responsive: true,
    animation: false,
    scales: {
      x: { ticks: { color: '#64748b', maxTicksLimit: 10 }, grid: { color: '#334155' } },
      y: { ticks: { color: '#64748b' }, grid: { color: '#334155' } }
    },
    plugins: { legend: { labels: { color: '#e2e8f0' } } }
  }
});

function log(msg) {
  const d = document.getElementById('log');
  const t = new Date().toLocaleTimeString();
  d.insertAdjacentHTML('afterbegin', `<div><span class="time">${t}</span>${msg}</div>`);
  if (d.children.length > 100) d.lastChild.remove();
}

function updateCard(data) {
  document.getElementById('heart_rate').textContent = data.heart_rate ?? '--';
  document.getElementById('spo2').textContent = data.spo2 ?? '--';
  document.getElementById('body_temperature').textContent = data.body_temperature ?? '--';
  document.getElementById('last').textContent = data.timestamp ?? '--';
  const dot = document.getElementById('st-dot');
  const st = document.getElementById('st-text');
  if (data.status === 'online') {
    dot.className = 'status online';
    st.textContent = 'online';
  } else {
    dot.className = 'status offline';
    st.textContent = 'offline';
  }
}

function resetChart() {
  chart.data.labels = [];
  chart.data.datasets.forEach(ds => ds.data = []);
  chart.update('none');
}

function pushChart(data) {
  const t = (data.timestamp || '').split(' ')[1] || '';
  chart.data.labels.push(t);
  chart.data.datasets[0].data.push(parseFloat(data.heart_rate) || 0);
  chart.data.datasets[1].data.push(parseFloat(data.spo2) || 0);
  chart.data.datasets[2].data.push(parseFloat(data.body_temperature) || 0);
  if (chart.data.labels.length > MAX_POINTS) {
    chart.data.labels.shift();
    chart.data.datasets.forEach(ds => ds.data.shift());
  }
  chart.update('none');
}

async function loadDevices() {
  const rows = await fetch('/api/devices').then(r => r.json());
  devicesCache = rows;
  const sel = document.getElementById('deviceSelect');
  const prev = currentDeviceId;
  sel.innerHTML = '';
  if (!rows.length) {
    sel.innerHTML = '<option value="">No devices</option>';
    document.getElementById('deviceItems').innerHTML = '<div style="color:#94a3b8;">No device data received yet</div>';
    currentDeviceId = '';
    return;
  }
  rows.forEach((d, idx) => {
    const opt = document.createElement('option');
    opt.value = d.device_id;
    opt.textContent = `${d.device_id} (${d.status})`;
    if ((prev && prev === d.device_id) || (!prev && idx === 0)) opt.selected = true;
    sel.appendChild(opt);
  });
  currentDeviceId = sel.value;
  renderDeviceItems();
}

function renderDeviceItems() {
  const box = document.getElementById('deviceItems');
  box.innerHTML = devicesCache.map(d => `
    <div class="device-item ${d.device_id === currentDeviceId ? 'active' : ''}" onclick="selectDevice('${d.device_id}')">
      <div><strong>${d.device_id}</strong></div>
      <div style="margin-top:6px;"><span class="status ${d.status === 'online' ? 'online' : 'offline'}"></span>${d.status}</div>
      <div style="margin-top:8px;color:#94a3b8;">Heart Rate ${d.heart_rate ?? '--'} bpm</div>
      <div style="color:#94a3b8;">SpO2 ${d.spo2 ?? '--'} %</div>
      <div style="color:#94a3b8;">Body Temp ${d.body_temperature ?? '--'} °C</div>
      <div style="margin-top:8px;color:#64748b;font-size:12px;">${d.timestamp || '--'}</div>
    </div>
  `).join('');
}

function selectDevice(deviceId) {
  currentDeviceId = deviceId;
  document.getElementById('deviceSelect').value = deviceId;
  renderDeviceItems();
  refreshCurrentDevice();
}

async function refreshCurrentDevice() {
  if (!currentDeviceId) return;
  const latest = await fetch(`/api/latest?device_id=${encodeURIComponent(currentDeviceId)}`).then(r => r.json());
  const rows = await fetch(`/api/data?limit=60&device_id=${encodeURIComponent(currentDeviceId)}`).then(r => r.json());
  updateCard(latest);
  resetChart();
  rows.forEach(pushChart);
  document.getElementById('toolbarStatus').textContent = `Current device: ${currentDeviceId}`;
}

async function refreshAll() {
  await loadDevices();
  await refreshCurrentDevice();
}

const evtSource = new EventSource('/stream');
evtSource.onmessage = async (e) => {
  try {
    const d = JSON.parse(e.data);
    log(`Data received: ${d.device_id} hr=${d.heart_rate} bpm spo2=${d.spo2}% temp=${d.body_temperature}°C`);
    await loadDevices();
    if (!currentDeviceId) currentDeviceId = d.device_id;
    if (d.device_id === currentDeviceId) {
      updateCard(d);
      pushChart(d);
    }
  } catch (err) {}
};
evtSource.onerror = () => log('SSE disconnected, retrying...');

document.getElementById('deviceSelect').addEventListener('change', (e) => {
  currentDeviceId = e.target.value;
  renderDeviceItems();
  refreshCurrentDevice();
});

async function sendCmd(cmd, value) {
  const res = await fetch('/api/control', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ cmd, value, device_id: currentDeviceId })
  });
  const j = await res.json();
  document.getElementById('cmd-res').textContent = j.success ? `Sent ${cmd}=${value} -> ${currentDeviceId}` : `Error: ${j.error}`;
  log(`Command sent: ${cmd}=${value} -> ${currentDeviceId}`);
}

refreshAll();
</script>
</body>
</html>
